<!DOCTYPE html>
<html lang="fr" class="bg-gray-950 text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEAN-BOT PREMIUM - Tableau de Bord Commandes</title>
    <!-- Tailwind CSS pour un design pro et responsive -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Importation de la police "Exo 2" (Futuriste, Accessible & Haute Visibilité) -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Défilement personnalisé style cockpit */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #991b1b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ef4444; }

        /* Application globale de la police typée HUD Exo 2 */
        .font-hud {
            font-family: 'Exo 2', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans selection:bg-red-600 selection:text-white">

    <!-- HEADER & LOGO -->
    <header class="border-b border-red-950 bg-gray-900/50 backdrop-blur sticky top-0 z-50 px-4 py-4">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-red-600 to-red-900 flex items-center justify-between shadow-lg shadow-red-900/30">
                    <i class="fa-solid fa-robot text-white text-2xl m-auto"></i>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-wide text-white uppercase font-hud">Jean-Bot <span class="text-red-500">Premium</span></h1>
                    <p class="text-xs text-gray-400 font-hud tracking-widest uppercase font-semibold">Compagnon de Bord Virtuel • v20.8</p>
                </div>
            </div>
            <div class="text-center sm:text-right">
                <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-green-500/10 text-green-400 border border-green-500/20 font-hud uppercase tracking-wider shadow-sm shadow-green-950">
                    <span class="w-2 h-2 rounded-full bg-green-500"></span>
                    Système En Ligne
                </span>
            </div>
        </div>
    </header>

    <!-- ZONE DE RECHERCHE ET FILTRES -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-6 flex flex-col gap-6">
        
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 shadow-xl flex flex-col gap-4">
            <!-- Barre de recherche -->
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-500"></i>
                <input type="text" id="searchBar" placeholder="Rechercher un ordre, un minerai, une lune ou un dossier de Lore..." 
                    class="w-full bg-gray-950 border border-gray-800 rounded-lg pl-12 pr-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-red-500 transition-colors font-hud">
            </div>

            <!-- Filtres par catégorie épurés avec le bouton MINAGE en orange -->
            <div class="flex flex-wrap gap-2" id="filterContainer">
                <button onclick="filterCategory('Tous')" id="btn-Tous" class="cat-btn px-4 py-2.5 rounded-lg text-xs font-bold transition-all duration-200 border border-blue-500 bg-blue-600 text-white shadow-lg shadow-blue-900/20 font-hud uppercase tracking-wider">Tous</button>
                <button onclick="filterCategory('Combat')" id="btn-Combat" class="cat-btn px-4 py-2.5 rounded-lg text-xs font-bold transition-all duration-200 border border-gray-800 bg-gray-950 text-gray-400 hover:text-white hover:border-gray-700 font-hud uppercase tracking-wider">Combat</button>
                <button onclick="filterCategory('Minage')" id="btn-Minage" class="cat-btn px-4 py-2.5 rounded-lg text-xs font-bold transition-all duration-200 border border-gray-800 bg-gray-950 text-gray-400 hover:text-white hover:border-gray-700 font-hud uppercase tracking-wider">Minage</button>
                <button onclick="filterCategory('Exploration')" id="btn-Exploration" class="cat-btn px-4 py-2.5 rounded-lg text-xs font-bold transition-all duration-200 border border-gray-800 bg-gray-950 text-gray-400 hover:text-white hover:border-gray-700 font-hud uppercase tracking-wider">Exploration</button>
                <button onclick="filterCategory('LORE')" id="btn-LORE" class="cat-btn px-4 py-2.5 rounded-lg text-xs font-bold transition-all duration-200 border border-gray-800 bg-gray-950 text-gray-400 hover:text-white hover:border-gray-700 font-hud uppercase tracking-wider">Lore</button>
                <button onclick="filterCategory('Navigation')" id="btn-Navigation" class="cat-btn px-4 py-2.5 rounded-lg text-xs font-bold transition-all duration-200 border border-gray-800 bg-gray-950 text-gray-400 hover:text-white hover:border-gray-700 font-hud uppercase tracking-wider">Navigation</button>
                <button onclick="filterCategory('Social')" id="btn-Social" class="cat-btn px-4 py-2.5 rounded-lg text-xs font-bold transition-all duration-200 border border-gray-800 bg-gray-950 text-gray-400 hover:text-white hover:border-gray-700 font-hud uppercase tracking-wider">Social</button>
            </div>
        </div>

        <!-- GRILLE DE COMMANDES -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="commandsGrid">
            <!-- Injecté via JS -->
        </div>

        <!-- Message "Aucun résultat" -->
        <div id="noResult" class="hidden text-center py-12 flex flex-col gap-3">
            <i class="fa-solid fa-robot text-gray-700 text-5xl"></i>
            <p class="text-gray-400 font-semibold font-hud">Bip Boop... Aucune commande ne correspond à votre recherche.</p>
        </div>
    </main>

        <p>&copy; 2026 Jean-Bot Premium • Structure Documentaire Spécifique Validée.</p>
    </footer>

        let currentCategory = 'Tous';

        const activeBtnStyles = {
            'Tous': 'border-blue-500 bg-blue-600 text-white shadow-lg shadow-blue-900/20',
            'Combat': 'border-red-500 bg-red-600 text-white shadow-lg shadow-red-900/20',
            'Minage': 'border-orange-500 bg-orange-600 text-white shadow-lg shadow-orange-900/20',
            'Exploration': 'border-cyan-500 bg-cyan-600 text-white shadow-lg shadow-cyan-900/20',
            'LORE': 'border-green-500 bg-green-600 text-white shadow-lg shadow-green-900/20',
            'Navigation': 'border-amber-500 bg-amber-600 text-white shadow-lg shadow-amber-900/20',
            'Social': 'border-purple-500 bg-purple-600 text-white shadow-lg shadow-purple-900/20'
        };

        const inactiveBtnStyle = 'border-gray-800 bg-gray-950 text-gray-400 hover:text-white hover:border-gray-700';

        // Fonction d'affichage dynamique des cartes
        function renderGrid() {
            const grid = document.getElementById('commandsGrid');
            const noResult = document.getElementById('noResult');
            const searchTerms = document.getElementById('searchBar').value.toLowerCase();
            
            grid.innerHTML = '';
            let hasCards = false;

            jeanBotCommands.forEach(cmd => {
                const matchesSearch = cmd.txt.toLowerCase().includes(searchTerms) || cmd.desc.toLowerCase().includes(searchTerms);
                const matchesCategory = currentCategory === 'Tous' || cmd.cat === currentCategory;

                if (matchesSearch && matchesCategory) {
                    hasCards = true;
                    
                    let badgeColor = 'bg-gray-500/20 text-gray-400 border-gray-500/30';
                    if(cmd.cat === 'Combat') badgeColor = 'bg-red-500/10 text-red-400 border-red-500/20';
                    if(cmd.cat === 'Minage') badgeColor = 'bg-orange-500/10 text-orange-400 border-orange-500/20';
                    if(cmd.cat === 'Exploration') badgeColor = 'bg-cyan-500/10 text-cyan-400 border-cyan-500/20';
                    if(cmd.cat === 'LORE') badgeColor = 'bg-green-500/10 text-green-400 border-green-500/20';
                    if(cmd.cat === 'Navigation') badgeColor = 'bg-amber-500/10 text-amber-400 border-amber-500/20';
                    if(cmd.cat === 'Social') badgeColor = 'bg-purple-500/10 text-purple-400 border-purple-500/20';

                    const keyTag = cmd.key ? `<kbd class="bg-gray-950 text-red-400 border border-gray-800 border-b-2 border-b-gray-700 px-2 py-0.5 rounded font-hud text-[10px] font-extrabold uppercase tracking-wide whitespace-nowrap shadow-md">${cmd.key}</kbd>` : '';

                    const card = document.createElement('div');
                    card.className = "bg-gray-900 border border-gray-800 hover:border-red-600/50 rounded-xl p-4 flex flex-col justify-between gap-4 transition-all duration-200 shadow-md hover:shadow-red-950/10 hover:scale-[1.02]";
                    
                    card.innerHTML = `
                        <div class="flex flex-col gap-2">
                            <div class="flex justify-between items-start">
                                <span class="px-2 py-0.5 text-[10px] font-bold uppercase rounded border ${badgeColor} font-hud">${cmd.cat}</span>
                            </div>
                            <h3 class="text-white font-hud font-bold text-base leading-snug tracking-wide mt-1">"${cmd.txt}"</h3>
                        </div>
                        <div class="text-gray-400 text-xs border-t border-gray-800/60 pt-3 flex justify-between items-center gap-4">
                            <p class="flex-1 leading-relaxed font-hud font-medium">${cmd.desc}</p>
                            ${keyTag}
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });

            if (hasCards) {
                noResult.classList.add('hidden');
            } else {
                noResult.classList.remove('hidden');
            }
        }

        // Gestion du changement de catégorie avec allumage de couleur
        function filterCategory(category) {
            currentCategory = category;
            
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn px-4 py-2.5 rounded-lg text-xs font-bold transition-all duration-200 border " + inactiveBtnStyle + " font-hud uppercase tracking-wider";
            });
            
            const activeBtn = document.getElementById("btn-" + category);
            activeBtn.className = "cat-btn px-4 py-2.5 rounded-lg text-xs font-bold transition-all duration-200 border " + activeBtnStyles[category] + " font-hud uppercase tracking-wider";
            
            renderGrid();
        }

        document.getElementById('searchBar').addEventListener('input', renderGrid);
        renderGrid();
    </script>
