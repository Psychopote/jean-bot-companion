<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEAN-BOT pour Star Citizen</title>
	
    <link type="image/png" rel="icon" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <!-- Le préchargement d'image a été retiré d'ici pour éviter d'exposer l'URL en clair -->
	
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .mb-10 { margin-bottom: 10px; }
        .h-15 { height: 15px; }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background-color: #000000;
        }

        .bg-jean-bot {
            position: absolute;
            top: -2%;
            left: -2%;
            width: 104%;
            height: 104%;
            /* L'IMAGE DE FOND EST MAINTENANT APPLIQUÉE DYNAMIQUEMENT PAR LE SCRIPT */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: brightness(0.29);
            will-change: transform;
            transition: transform 0.15s ease-out;
        }

        .bg-container::before,
        .bg-container::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 25%;
            z-index: 1;
            pointer-events: none;
        }

        .bg-container::before {
            top: 0;
            background: linear-gradient(to bottom, #000000 0%, rgba(0, 0, 0, 0.6) 40%, rgba(0, 0, 0, 0) 100%);
        }
        .bg-container::after {
            bottom: 0;
            background: linear-gradient(to top, #000000 0%, rgba(0, 0, 0, 0.6) 40%, rgba(0, 0, 0, 0) 100%);
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
            align-items: center;
            z-index: 1;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), filter 0.5s ease;
        }

        body.panel-open .container {
            transform: scale(0.95) translateX(-80px);
            filter: blur(4px) brightness(0.4);
            pointer-events: none;
        }

        @media (max-width: 768px) {
            body.panel-open .container {
                filter: brightness(0.2);
                transform: scale(0.95);
            }
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1.2fr 0.8fr;
            }
        }

        .content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center;
        }

        .top-lead {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
            margin-bottom: 12px;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, #ff003c 0%, #3f161e 100%); 
            color: #f1f5f9;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.4);
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(255, 0, 60, 0.8);
            border-color: rgba(255, 255, 255, 0.4);
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 4px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .powered-by {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .va-dropdown {
            position: relative;
            display: inline-block;
        }

        .va-trigger {
            color: #93c5fd;
            text-decoration: none;
            font-weight: 700;
            border-bottom: 1px dashed rgba(147, 197, 253, 0.5);
            padding-bottom: 1px;
            cursor: pointer;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        .va-trigger:hover {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }

        .va-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            background: rgb(21, 32, 54); 
            border: 1px solid rgba(147, 197, 253, 0.2);
            border-radius: 8px;
            padding: 6px;
            min-width: 160px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.7), 0 0 15px rgba(59, 130, 246, 0.1);
            z-index: 10;
        }

        @supports (backdrop-filter: blur(12px)) {
            .va-menu {
                background: rgba(15, 23, 42, 0.9);
                backdrop-filter: blur(12px);
            }
        }

        .va-dropdown:hover .va-menu,
        .va-dropdown.active .va-menu {
            display: block;
            animation: fadeInVA 0.2s ease-out;
        }

        .va-menu a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.75rem;
            padding: 8px 12px;
            border-radius: 6px;
            text-align: left;
            letter-spacing: 0.5px;
            font-weight: 600;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .va-menu a:hover {
            background: rgba(59, 130, 246, 0.2);
            color: #ffffff;
        }

        @keyframes fadeInVA {
            from { opacity: 0; transform: translateX(-50%) translateY(2px); }
            to { opacity: 1; transform: translateX(-50%) translateY(8px); }
        }

        p {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-bottom: 30px;
            line-height: 1.6;
            text-shadow: 0 2px 5px rgba(0,0,0,0.9);
        }

        .actions-container {
            display: flex;
            flex-direction: column;
            gap: 16px; 
            align-items: center; 
            justify-content: center;
            width: 100%;
        }

        .btn-trigger-console {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 420px;
            height: 54px;
            padding: 0 30px;
            background: linear-gradient(90deg, #0066ff 0%, #b533ff 50%, #ff003c 100%);
            color: #f8fafc;
            text-decoration: none;
            font-weight: 800;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(255, 0, 60, 0.45), 0 8px 32px rgba(0, 102, 255, 0.3);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            font-size: 1.1rem;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .btn-trigger-console:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 45px rgba(255, 0, 60, 0.7), 0 12px 40px rgba(0, 102, 255, 0.5);
            filter: brightness(1.15);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .divider {
            width: 100%;
            max-width: 420px;
            height: 1px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0) 100%);
            margin: 10px 0;
        }

        .btn-trigger-cyber {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 420px;
            height: 54px;
            padding: 0 30px;
            background: linear-gradient(90deg, #00d4ff 0%, #005f73 40%, #091324 100%);
            color: #ffffff;
            text-decoration: none;
            font-weight: 800;
            border-radius: 14px;
            border: 1px solid rgba(0, 212, 255, 0.6);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.25);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            font-size: 1.02rem;
            letter-spacing: 1px;
            cursor: pointer;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .btn-trigger-cyber:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 35px rgba(0, 212, 255, 0.5);
            background: linear-gradient(90deg, #33e1ff 0%, #008fa8 50%, #0e1e38 100%);
            border-color: #ffffff;
        }

        .btn-boutique {
            display: block;
            width: 100%;
            max-width: 420px;
            height: 82px; 
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 25px rgba(255, 0, 0, 0.2);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }

        .btn-boutique img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        .btn-boutique:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 35px rgba(255, 0, 0, 0.55);
            filter: brightness(1.1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .social-container {
            display: flex;
            gap: 12px;
            justify-content: space-between; 
            margin-top: 15px;
            width: 100%;
            max-width: 420px;
        }

        .btn-social {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: calc(20% - 9.6px);
            height: 50px;
            color: #cbd5e1;
            text-decoration: none;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid #334155;
            border-radius: 10px;
            transition: transform 0.2s ease, color 0.2s ease, border-color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
            backdrop-filter: blur(4px);
        }

        .btn-social:hover {
            transform: translateY(-3px);
            color: #ffffff;
            border-color: #64748b;
            background: rgba(30, 41, 59, 0.9);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .btn-social svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .video-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .video-container {
            width: 100%;
            max-width: 340px;
            aspect-ratio: 9 / 16;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 
                        0 0 40px rgba(145, 70, 255, 0.15);
            border: 4px solid #1e293b;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        video::-webkit-media-controls-fullscreen-button {
            display: none !important;
        }
        
        .panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        body.panel-open .container {
            transform: scale(0.95) translateX(-80px);
            filter: blur(4px) brightness(0.4);
            pointer-events: none;
        }

        .side-console {
            position: fixed;
            top: 0;
            right: -550px;
            width: 100%;
            max-width: 520px;
            height: 100vh;
            background: rgb(15, 15, 20); 
            z-index: 100;
            border-left: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: -15px 0 50px rgba(0, 0, 0, 0.8);
            transition: right 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 40px 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        @supports (backdrop-filter: blur(30px)) {
            .side-console {
                background: rgba(12, 12, 15, 0.85);
                backdrop-filter: blur(30px);
                -webkit-backdrop-filter: blur(30px);
            }
        }

        body.panel-open .side-console {
            right: 0;
        }

        .close-console {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
            margin-bottom: 30px;
        }

        .close-console:hover {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            border-color: #00d4ff;
        }

        .console-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            margin-bottom: 5px;
        }

        .console-subtitle {
            text-align: center;
            color: #ff3e3e;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
        }

        .console-subtitle.cyber {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 900;
            text-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
        }

        .console-cards {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .c-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .c-card-demo { border-left: 3px solid #334155; }
        .c-card-premium { border-left: 3px solid #ff3e3e; background: rgba(255, 62, 62, 0.01); box-shadow: 0 4px 20px rgba(255, 62, 62, 0.05); }
        .c-card-virgil { border-left: 3px solid #0055ff; background: rgba(0, 85, 255, 0.01); box-shadow: 0 4px 20px rgba(0, 85, 255, 0.05); }
        .c-card-synthia { border-left: 3px solid #a855f7; background: rgba(168, 85, 247, 0.01); box-shadow: 0 4px 20px rgba(168, 85, 247, 0.05); }

        .c-card-layout { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .c-card-info { flex: 1; z-index: 2; }

        .c-card-media {
            width: 110px;
            height: 110px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .c-card-media img { width: 100%; height: 100%; object-fit: contain; }

        .c-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .cb-free { background-color: rgba(255,255,255,0.06); color: #00e676; }
        .cb-premium { background-color: rgba(255, 62, 62, 0.15); color: #ff3e3e; }
        .cb-virgil { background-color: rgba(0, 85, 255, 0.15); color: #3377ff; }
        .cb-synthia { background-color: rgba(168, 85, 247, 0.15); color: #c084fc; }

        .c-card h4 { font-size: 1.15rem; color: #fff; margin-bottom: 12px; line-height: 1.3; }
        .c-card h4 u { text-decoration: underline; text-underline-offset: 4px; }
        .c-promo-text { color: #00e676; font-size: 12px; font-weight: bold; margin-bottom: 15px; line-height: 1.4; }

        .c-list { color: #94a3b8; font-size: 13px; line-height: 1.6; margin-bottom: 20px; padding-left: 18px; }
        .c-list-unstyled { list-style: none; padding-left: 0; }
        .c-card-desc { color: #cbd5e1; font-size: 13px; line-height: 1.5; margin-bottom: 4px; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5); }

        .c-btn-demo {
            display: block; background: #00e676; color: #000000; text-align: center; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3); transition: background-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
        }
        .c-btn-demo:hover { background: #00ff81; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 230, 118, 0.5); }

        .c-btn-virgil {
            display: block; background: #0055ff; color: #ffffff; text-align: center; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 15px rgba(0, 85, 255, 0.3); transition: background-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease; margin-top: 15px;
        }
        .c-btn-virgil:hover { background: #3377ff; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 85, 255, 0.5); }

        .c-btn-synthia {
            display: block; background: #a855f7; color: #ffffff; text-align: center; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3); transition: background-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease; margin-top: 15px;
        }
        .c-btn-synthia:hover { background: #b566ff; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5); }

        .c-btn-premium {
            display: block; padding: 14px 28px; background: #ff3e3e; color: #ffffff; text-decoration: none; font-weight: 800; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 20px rgba(255, 62, 62, 0.4); transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease, border-color 0.3s ease; text-transform: uppercase; font-size: 1.15rem; letter-spacing: 0.5px; cursor: pointer; width: 100%; text-align: center;
        }
        .c-btn-premium:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255, 62, 62, 0.7); background: #ff5252; border-color: rgba(255, 255, 255, 0.4); }

        .c-grid-container { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 480px) { .c-grid-container { grid-template-columns: 1fr 1fr; } }

        .c-link-steam { display: block; text-align: center; color: #64748b; text-decoration: underline; font-size: 11px; margin-top: 12px; }
        .c-link-steam:hover { color: #94a3b8; }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="bg-jean-bot" id="parallaxBg"></div>
    </div>

    <div class="panel-overlay" id="consoleOverlay"></div>

    <div class="side-console" id="sideConsole">
        <button class="close-console" id="closeConsoleBtn">Retour cockpit ✕</button>
        <div id="consoleContent"></div>
    </div>

    <div class="container" id="mainContainer">
        
        <div class="content">
            <p class="top-lead">Le robot psychopathe qui vous accompagne dans "Star Citizen"</p>
            <h1>JEAN-BOT</h1>
            
            <div class="powered-by">
                Packs de voix pour 
                <div class="va-dropdown" id="vaDropdown">

                    </div>
                </div>
            </div>            
            
            <a href="commandes.html" class="badge">Les commandes de Jean-Bot</a>
            
            <div class="actions-container">
                <button class="btn-trigger-console" id="openConsoleBtn">NOS PACKS JEAN-BOT</button>
                
                <div class="divider"></div>
				
                <button class="btn-trigger-cyber" id="openDemosBtn">NOS AUTRES PACKS DEMOS GRATUITS</button>
                
                <a id="link-boutique" href="#" target="_blank" class="btn-boutique">
                    <img id="img-boutique" src="" alt="Boutique Jean-Bot">
                </a>
                
                <div class="social-container">
                    <a href="https://www.twitch.tv/joffre_tiboy" target="_blank" class="btn-social twitch" aria-label="Twitch">
                        <svg viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/></svg>
