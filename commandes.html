<script>
        // ==============================================================================
        // COFFRE-FORT NUMÉRIQUE : TOUTES LES ENDPOINTS ET URLS SONT SÉCURISÉES ICI
        // (Chiffrement Base64 pour ne laisser aucune adresse en clair dans le HTML source)
        // ==============================================================================
        const COFFRE_FORT = {
            jsonJeanbot: "Li9jb21tYW5kZXMtamVhbi1ib3QuanNvbg==",
            jsonSynthia: "Li9jb21tYW5kZXMtc3ludGhpYS5qc29u",
            jsonVirgil: "Li9jb21tYW5kZXMtdmlyZ2lsLmpzb24=",
            driveDemo: "aHR0cHM6Ly9kcml2ZS5nb29nbGUuY29tL2RyaXZlL2ZvbGRlcnMvMWtBWGpQUnNMTFlVcXVhczl5MlgyV3hrclJKMk9DSEJpP3VzcD1zaGFyaW5n",
            tipeeePremium: "aHR0cHM6Ly9mci50aXBlZWUuY29tL2pvZmZyZQ==",
            virgilPng: "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1BzeWNob3BvdGUvamVhbi1ib3QtY29tcGFuaW9uL21haW4vVklSR0lMLnBuZw==",
            driveVirgil: "aHR0cHM6Ly9kcml2ZS5nb29nbGUuY29tL2RyaXZlL2ZvbGRlcnMvMU1RZWg4ZzhpQkF3ZUZFcEtTYlo5NUVxQVlnRWFibmhfP3VzcD1kcml2ZV9saW5r",
            synthiaPng: "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1BzeWNob3BvdGUvamVhbi1ib3QtY29tcGFuaW9uL21haW4vU1lOVEhJQS5wbmc=",
            driveSynthia: "aHR0cHM6Ly9kcml2ZS5nb29nbGUuY29tL2RyaXZlL2ZvbGRlcnMvMTh5SGQ1d0Q1bXgyWkpneWRrSGdQN290aXpObTV0YU14P3VzcD1kcml2ZV9saW5r"
        };

        const unmask = (key) => window.atob(COFFRE_FORT[key]);

        // RECEPTACLE DES BASES DE DONNÉES DE CHAQUE COPILOTE
        let allCommands = {
            'Jean-Bot': [],
            'Synthia': [],
            'Virgil': []
        };
        
        let currentCategory = 'Tous';
        let currentIA = 'Jean-Bot';
        let activeWebhookUrl = '';

        // 🔹 MODIFIE CE CHIFFRE ICI QUAND LE PACK GRANDIT DANS VOICEATTACK
        const COMPTEUR_REEL_VOICEATTACK = "3 154"; 

        const inactiveBtnStyle = 'border-gray-800 bg-gray-950 text-gray-400 hover:text-white hover:border-gray-700';

        // LIAISON ET CHARGEMENT SIMULTANÉ DES 3 FICHIERS JSON DISTINCTS CHIFBRÉS
        document.addEventListener('DOMContentLoaded', () => {
            const files = [
                { ia: 'Jean-Bot', url: unmask('jsonJeanbot') },
                { ia: 'Synthia', url: unmask('jsonSynthia') },
                { ia: 'Virgil', url: unmask('jsonVirgil') }
            ];

            Promise.all(files.map(file => 
                fetch(file.url)
                    .then(response => response.ok ? response.json() : [])
                    .catch(() => [])
            ))
            .then(results => {
                allCommands['Jean-Bot'] = results[0];
                allCommands['Synthia'] = results[1];
                allCommands['Virgil'] = results[2];

                // 🔹 ENVOI DU VRAI NOMBRE GLOBAL DANS L'EN-TÊTE DU COCKPIT
                document.getElementById('totalCommandsCount').innerText = COMPTEUR_REEL_VOICEATTACK;

                // Initialisation par défaut sur l'affichage de Jean-Bot
                selectIAFilter('Jean-Bot');
            })
            .catch(error => {
                console.error("Erreur critique d'initialisation avionique :", error);
                document.getElementById('totalCommandsCount').innerText = "Hors Ligne";
            });
        });

        function toggleIAConsole() {
            const panel = document.getElementById('iaConsolePanel');
            const chevron = document.getElementById('consoleChevron');
            panel.classList.toggle('hidden');
            chevron.classList.toggle('rotate-180');
        }

        function checkSecretCode() {
            const code = document.getElementById('secretCodeInput').value.trim().toUpperCase();
            const log = document.getElementById('terminalLog');
            
            if(!code) {
                log.innerHTML = `> <span class="text-red-500">[ERREUR] Saisie vide. Vecteur nul abandonné.</span>`;
                return;
            }
            log.innerHTML = `> Requête d'authentification ./${code}.json en cours...`;

            fetch(`./${code}.json`)
                .then(response => {
                    if (response.ok) return response.json();
                    throw new Error('NOT_FOUND');
                })
                .then(data => {
                    if (data && data.webhook) {
                        activeWebhookUrl = data.webhook;
                        document.getElementById('codeEntryForm').classList.add('hidden');
                        document.getElementById('rewardForm').classList.remove('hidden');
                        log.innerHTML = `> <span class="text-green-400">[ACCÈS AUTORISÉ] Liaison quantique sécurisée parée pour transfert.</span>`;
                    } else {
                        log.innerHTML = `> <span class="text-red-500">[ÉCHEC] Structure de clé corrompue.</span>`;
                    }
                })
                .catch(() => {
                    log.innerHTML = `> <span class="text-red-500">[ÉCHEC] Code introuvable. Effacement des journaux système.</span>`;
                });
        }

        function submitRewardClaim() {
            const email = document.getElementById('rewardEmail').value.trim();
            const discord = document.getElementById('rewardDiscord').value.trim();
            const log = document.getElementById('terminalLog');

            if(!email || !discord) {
                alert("Flux incomplet ! Saisissez vos identifiants réseau de pilotes.");
                return;
            }
            if(!activeWebhookUrl) {
                alert("Erreur critique : Canal Discord introuvable.");
                return;
            }

            log.innerHTML = `> Initialisation du protocole de transmission vers Discord...`;
            const payload = {
                content: `**ALERTE GAGNANT SITE JEAN-BOT**\nUn opérateur vient de valider une liaison quantique sur le site !\n\n**Identifiants cryptés transmis :**\n- **Pseudo Discord :** \`${discord}\`\n- **Adresse de contact :** \`${email}\``
            };

            fetch(activeWebhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if(res.ok) {
                    document.getElementById('rewardForm').classList.add('hidden');
                    log.innerHTML = `> <span class="text-green-400">[TRANSFERT RÉUSSI] Paquet réseau envoyé avec succès au cockpit de l'Amiral Joffré. Fermeture du canal.</span>`;
                } else {
                    log.innerHTML = `> <span class="text-red-500">[ÉCHEC] Rejet du paquet par le serveur Discord distant.</span>`;
                }
            })
            .catch(() => {
                log.innerHTML = `> <span class="text-red-500">[ERREUR] Perte de liaison physique lors de l'envoi.</span>`;
            });
        }

        function switchIAUi(iaName) {
            const titleSpan = document.getElementById('headerPremiumSpan');
            const mainTitle = document.getElementById('headerTitleText');
            if(iaName === 'Jean-Bot') {
                titleSpan.innerText = "Premium";
                titleSpan.className = "text-red-500 transition-colors";
                mainTitle.innerText = "Jean-Bot ";
            } else if(iaName === 'Synthia') {
                titleSpan.innerText = "Synthia Edition";
                titleSpan.className = "text-pink-500 transition-colors";
                mainTitle.innerText = "";
            } else if(iaName === 'Virgil') {
                titleSpan.innerText = "Virgil OS";
                titleSpan.className = "text-orange-500 transition-colors";
                mainTitle.innerText = "";
            }
        }

        function selectIAFilter(iaName) {
            currentIA = iaName;
            const ias = ['Jean-Bot', 'Synthia', 'Virgil'];
            const colors = {
                'Jean-Bot': { text: 'text-red-400', border: 'border-red-500', bg: 'bg-red-950/40 shadow-lg shadow-red-950/30' },
                'Synthia': { text: 'text-pink-400', border: 'border-pink-500', bg: 'bg-pink-950/40 shadow-lg shadow-pink-950/30' },
                'Virgil': { text: 'text-orange-400', border: 'border-orange-500', bg: 'bg-orange-600/10 shadow-lg shadow-orange-950/30' }
            };

            ias.forEach(name => {
                const btn = document.getElementById('ia-filter-' + name);
                const dot = document.getElementById('ia-dot-' + name);
                if(name === iaName) {
                    btn.className = `flex flex-col items-center justify-center py-5 px-3 rounded-xl border ${colors[name].border} ${colors[name].bg} ${colors[name].text} font-hud uppercase tracking-wider transition-all duration-200 cursor-pointer w-full`;
                    dot.className = "fa-solid fa-circle-dot text-xs mb-1.5 animate-pulse";
                } else {
                    btn.className = "flex flex-col items-center justify-center py-5 px-3 rounded-xl border border-gray-800 bg-gray-900/30 text-gray-500 hover:text-gray-300 hover:border-gray-700 font-hud uppercase tracking-wider transition-all duration-200 cursor-pointer w-full shadow-none";
                    dot.className = "fa-solid fa-circle text-xs mb-1.5 opacity-20";
                }
            });

            switchIAUi(iaName);

            const searchFilterBlock = document.getElementById('searchFilterBlock');
            const commandsGrid = document.getElementById('commandsGrid');
            const constructionBlock = document.getElementById('iaConstructionBlock');
            const noResult = document.getElementById('noResult');

            const hasCommands = allCommands[iaName] && allCommands[iaName].length > 0;

            if (hasCommands) {
                searchFilterBlock.classList.remove('hidden');
                commandsGrid.classList.remove('hidden');
                constructionBlock.classList.add('hidden');
                renderGrid();
            } else {
                searchFilterBlock.classList.add('hidden');
                commandsGrid.classList.add('hidden');
                noResult.classList.add('hidden');
                constructionBlock.classList.remove('hidden');
            }
        }

        function renderGrid() {
            const grid = document.getElementById('commandsGrid');
            const noResult = document.getElementById('noResult');
            const searchTerms = (document.getElementById('searchBar').value || '').toLowerCase();
            
            grid.innerHTML = '';
            let hasCards = false;

            const activeCommands = allCommands[currentIA] || [];

            activeCommands.forEach(cmd => {
                if (!cmd) return;
                
                // 🔹 SÉCURITÉ ABSOLUE : Si un champ manque dans le JSON, on évite le crash
                const txt = (cmd.txt || '').toLowerCase();
                const desc = (cmd.desc || '').toLowerCase();
                const cat = cmd.cat || 'Tous';

                const matchesSearch = txt.includes(searchTerms) || desc.includes(searchTerms);
                const matchesCategory = currentCategory === 'Tous' || currentCategory === cat;

                if (matchesSearch && matchesCategory) {
                    hasCards = true;
                    let badgeColor = 'bg-gray-500/20 text-gray-400 border-gray-500/30';
                    if(cat === 'Combat') badgeColor = 'bg-red-500/10 text-red-400 border-red-500/20';
                    if(cat === 'Minage') badgeColor = 'bg-violet-500/10 text-violet-400 border-violet-500/20';
                    if(cat === 'Exploration') badgeColor = 'bg-cyan-500/10 text-cyan-400 border-cyan-500/20';
                    if(cat === 'LORE') badgeColor = 'bg-green-500/10 text-green-400 border-green-500/20';
                    if(cat === 'Navigation') badgeColor = 'bg-orange-500/10 text-orange-400 border-orange-500/20';
                    if(cat === 'Social') badgeColor = 'bg-pink-500/10 text-pink-400 border-pink-500/20';

                    const keyTag = cmd.key ? `<kbd class="bg-gray-950 text-red-400 border border-gray-800 border-b-2 border-b-gray-700 px-2 py-0.5 rounded font-hud text-[10px] font-extrabold uppercase tracking-wide whitespace-nowrap shadow-md">${cmd.key}</kbd>` : '';

                    const card = document.createElement('div');
                    card.className = "bg-gray-900 border border-gray-800 hover:border-red-600/50 rounded-xl p-4 flex flex-col justify-between gap-4 transition-all duration-200 shadow-md hover:shadow-red-950/10 hover:scale-[1.02] cursor-pointer";
                    card.setAttribute('onclick', `openHudModal("${encodeURIComponent(cmd.txt || '')}", "${cat}", "${encodeURIComponent(cmd.desc || '')}", "${encodeURIComponent(cmd.key || '')}")`);
                    
                    card.innerHTML = `
                        <div class="flex flex-col gap-2">
                            <div class="flex justify-between items-start">
                                <span class="px-2 py-0.5 text-[10px] font-bold uppercase rounded border ${badgeColor} font-hud">${cat}</span>
                            </div>
                            <h3 class="text-white font-hud font-bold text-base leading-snug tracking-wide mt-1">"${cmd.txt || ''}"</h3>
                        </div>
                        <div class="text-gray-400 text-xs border-t border-gray-800/60 pt-3 flex justify-between items-center gap-4">
                            <p class="flex-1 leading-relaxed font-hud font-medium line-clamp-2 md:line-clamp-none">${cmd.desc || ''}</p>
                            ${keyTag}
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });

            if (hasCards) {
                noResult.classList.add('hidden');
            } else {
                noResult.classList.remove('hidden');
            }
        }

        function openHudModal(txt, cat, desc, key) {
            const modal = document.getElementById('hudModal');
            const box = document.getElementById('modalBox');
            
            document.getElementById('modalTitle').innerText = `"${decodeURIComponent(txt)}"`;
            document.getElementById('modalDesc').innerText = decodeURIComponent(desc);
            
            const badge = document.getElementById('modalBadge');
            badge.innerText = cat;
            badge.className = "px-2.5 py-1 text-xs font-bold uppercase rounded border font-hud ";
            
            const colorMap = { 'Combat': '#ef4444', 'Minage': '#8b5cf6', 'Exploration': '#06b6d4', 'LORE': '#22c55e', 'Navigation': '#f97316', 'Social': '#ec4899' };
            const activeColor = colorMap[cat] || '#3b82f6';
            let glowColor = 'rgba(59, 130, 246, 0.4)';
            
            if(cat === 'Combat') { badge.classList.add('bg-red-500/10', 'text-red-400', 'border-red-500/20'); glowColor = 'rgba(239, 68, 68, 0.5)'; }
            if(cat === 'Minage') { badge.classList.add('bg-violet-500/10', 'text-violet-400', 'border-violet-500/20'); glowColor = 'rgba(139, 92, 246, 0.5)'; }
            if(cat === 'Exploration') { badge.classList.add('bg-cyan-500/10', 'text-cyan-400', 'border-cyan-500/20'); glowColor = 'rgba(6, 182, 212, 0.5)'; }
            if(cat === 'LORE') { badge.classList.add('bg-green-500/10', 'text-green-400', 'border-green-500/20'); glowColor = 'rgba(34, 197, 94, 0.5)'; }
            if(cat === 'Navigation') { badge.classList.add('bg-orange-500/10', 'text-orange-400', 'border-orange-500/20'); glowColor = 'rgba(249, 115, 22, 0.5)'; }
            if(cat === 'Social') { badge.classList.add('bg-pink-500/10', 'text-pink-400', 'border-pink-500/20'); glowColor = 'rgba(236, 72, 153, 0.5)'; }

            const corners = ['bracket-tl', 'bracket-tr', 'bracket-bl', 'bracket-br'];
            corners.forEach(id => { document.getElementById(id).style.borderColor = activeColor; });

            box.style.boxShadow = `0 0 35px ${glowColor}`;
            modal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                box.classList.remove('scale-90', 'opacity-0');
                box.classList.add('scale-100', 'opacity-100');
            }, 15);
        }

        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeHudModal(); });

        function closeHudModal() {
            const modal = document.getElementById('hudModal');
            const box = document.getElementById('modalBox');
            box.classList.remove('scale-100', 'opacity-100');
            box.classList.add('scale-90', 'opacity-0');
            setTimeout(() => { modal.classList.add('opacity-0', 'pointer-events-none'); }, 250);
        }

        const activeBtnStyles = {
            'Tous': 'border-blue-500 bg-blue-600 text-white shadow-lg shadow-blue-900/20',
            'Combat': 'border-red-500 bg-red-600 text-white shadow-lg shadow-red-900/20',
            'Minage': 'border-violet-500 bg-violet-600 text-white shadow-lg shadow-violet-900/20',
            'Exploration': 'border-cyan-500 bg-cyan-600 text-white shadow-lg shadow-cyan-900/20',
            'LORE': 'border-green-500 bg-green-600 text-white shadow-lg shadow-green-900/20',
            'Navigation': 'border-orange-500 bg-orange-600 text-white shadow-lg shadow-orange-900/20',
            'Social': 'border-pink-500 bg-pink-600 text-white shadow-lg shadow-pink-900/20'
        };

        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn px-4 py-2.5 rounded-lg text-xs font-bold transition-all duration-200 border " + inactiveBtnStyle + " font-hud uppercase tracking-wider";
            });
            const activeBtn = document.getElementById("btn-" + category);
            activeBtn.className = "cat-btn px-4 py-2.5 rounded-lg text-xs font-bold transition-all duration-200 border " + activeBtnStyles[category] + " font-hud uppercase tracking-wider";
            renderGrid();
        }

        // Événements d'affichage des volets latéraux
        const closeBtn = document.getElementById('closeConsoleBtn');
        const overlay = document.getElementById('consoleOverlay');
        const sideConsole = document.getElementById('sideConsole');
        const consoleContent = document.getElementById('consoleContent');
        const tmplJeanbot = document.getElementById('tmpl-jeanbot');
        const tmplCyber = document.getElementById('tmpl-cyber');

        function injectTemplate(templateElement) {
            const clone = templateElement.content.cloneNode(true);
            consoleContent.replaceChildren(clone);
        }

        document.getElementById('openConsoleBtn').addEventListener('click', () => {
            injectTemplate(tmplJeanbot);
            document.getElementById('btn-drive-demo').href = unmask('driveDemo');
            document.getElementById('btn-tipeee-premium').href = unmask('tipeeePremium');
            sideConsole.style.borderLeft = "1px solid rgba(255, 62, 62, 0.3)";
            document.body.classList.add('panel-open');
            sideConsole.scrollTop = 0;
        });

        document.getElementById('openDemosBtn').addEventListener('click', () => {
            injectTemplate(tmplCyber);
            document.getElementById('img-virgil').src = unmask('virgilPng');
            document.getElementById('btn-drive-virgil').href = unmask('driveVirgil');
            document.getElementById('img-synthia').src = unmask('synthiaPng');
            document.getElementById('btn-drive-synthia').href = unmask('driveSynthia');
            sideConsole.style.borderLeft = "1px solid rgba(0, 212, 255, 0.4)";
            document.body.classList.add('panel-open');
            sideConsole.scrollTop = 0;
        });

        closeBtn.addEventListener('click', () => document.body.classList.remove('panel-open'));
        overlay.addEventListener('click', () => document.body.classList.remove('panel-open'));
        document.getElementById('searchBar').addEventListener('input', renderGrid);
    </script>
